services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eip
      POSTGRES_USER: eip
      POSTGRES_PASSWORD: eip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eip -d eip"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
